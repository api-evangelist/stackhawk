aid: stackhawk
name: StackHawk
description: >-
  StackHawk is an application and API security testing platform that helps
  engineering teams find, triage, and fix security vulnerabilities in their
  APIs and web applications. It provides Dynamic Application Security Testing
  (DAST) with deep OpenAPI spec integration, CI/CD pipeline automation, AI-powered
  spec generation, and an AppSec Intelligence platform for program-level visibility
  across the software development lifecycle.
