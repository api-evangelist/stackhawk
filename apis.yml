    name: StackHawk API
    description: >-
      The StackHawk Public API provides programmatic access to the StackHawk
      platform, enabling management of applications, environments, scan
      configurations, scan results, findings, repositories, teams, policies,
      and reports. Authentication uses JWT tokens obtained via API key.
